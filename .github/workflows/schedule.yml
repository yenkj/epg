name: Generate TV Schedule XML

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨3点运行（可以按需调整）
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install requests

    - name: Run fetch_schedule.py
      run: python fetch_schedule.py

    - name: Commit and push schedule.xml if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add schedule.xml
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update schedule.xml"
          git push
        fi
