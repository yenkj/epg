name: TVKing EPG Generator

on:
  workflow_dispatch:
  push:
    paths:
      - fetch_schedule.py
  schedule:
    - cron: "0 2 * * *"  # 每日 10:00（UTC+8）执行一次

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      run: python fetch_schedule.py

    - name: Upload schedule.xml
      uses: actions/upload-artifact@v4
      with:
        name: tvking-epg
        path: schedule.xml
