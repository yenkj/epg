name: 生成 EPG XML

on:
  schedule:
    - cron: '0 16 * * *'  # 每天北京时间 00:00（UTC+8 → UTC 16:00）
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 生成 epg.xml
        run: python epg.py

      - name: 自动提交并推送 epg.xml
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add epg.xml
          git diff --quiet --cached || git commit -m "自动更新 epg.xml"
          git pull --rebase
          git push
