name: 生成 EPG XML

on:
  schedule:
    - cron: '2 16 * * *'  # 每天北京时间 00:00
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install --upgrade pip requests beautifulsoup4 lxml

      - name: 设置 Git 身份（防止推送失败）
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: 运行 epg.py
        run: python epg.py

      - name: 提交并推送更新
        run: |
          git add epg.xml boss.xml
          if ! git diff --cached --quiet; then
            git commit -m "📺 自動更新 epg.xml & boss.xml"
            git pull --rebase --autostash
            git push
          else
            echo "✅ 沒有變更，跳過提交"
